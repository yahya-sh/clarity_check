{% extends "base.html" %}

{% block title %}Instructor Registration - {{ super() }}{% endblock %}

{% block content %}
<div class="flex-1 flex flex-col items-center justify-center w-full min-h-[calc(100vh-4rem)] py-12 px-4">
  <!-- Background Glow -->
  <div class="absolute inset-0 bg-bg/50 pointer-events-none z-[-1] flex items-center justify-center">
    <div class="w-[500px] h-[500px] bg-accent/10 rounded-full blur-[100px] opacity-60 mix-blend-screen"></div>
  </div>

  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="bg-surface/50 border border-border rounded-xl p-8 backdrop-blur-sm shadow-xl">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-accent/10 border border-accent/20 mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-accent">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" x2="20" y1="8" y2="14"/>
            <line x1="23" x2="17" y1="11" y2="11"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold tracking-tight text-text">Create account</h1>
        <p class="text-muted mt-2 text-sm">Sign up to start creating presentations</p>
      </div>

      <!-- Form -->
      {% include "instructor/forms/_register.html" %}

      <!-- Footer -->
      <div class="mt-6 text-center">
        <p class="text-sm text-muted">
          Already have an account?
          <a href="/login" class="text-accent hover:text-accent/80 font-medium transition-colors">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
