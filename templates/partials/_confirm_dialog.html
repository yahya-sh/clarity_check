<!-- Reusable Confirmation Dialog Modal -->
<div id="confirmDialogModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-surface border border-border rounded-xl shadow-2xl max-w-md w-full p-6">
            <div class="flex items-center justify-center w-12 h-12 mx-auto bg-red-500/20 rounded-full mb-4">
                <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
            <h3 id="confirmDialogTitle" class="text-lg font-semibold text-text text-center mb-2">Confirm Action</h3>
            <p id="confirmDialogMessage" class="text-muted text-center mb-6">Are you sure you want to proceed? This action cannot be undone.</p>
            
            <form id="confirmDialogForm" method="POST" class="hidden">
                <input type="hidden" name="csrf_token" id="confirmDialogCsrfToken">
            </form>
            
            <div class="flex gap-3">
                <button 
                    type="button" 
                    onclick="closeConfirmDialog()"
                    class="flex-1 px-4 py-2 text-text bg-secondary border border-border rounded-lg hover:bg-secondary/70 transition-colors font-medium cursor-pointer"
                >
                    Cancel
                </button>
                <button 
                    type="button" 
                    onclick="confirmDialogAction()"
                    class="flex-1 px-4 py-2 text-white bg-red-600 border border-red-600 rounded-lg hover:bg-red-700 transition-colors font-medium cursor-pointer"
                >
                    Confirm
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// Reusable confirmation dialog functions
function showConfirmDialog(title, message, actionUrl, csrfToken) {
    const modal = document.getElementById('confirmDialogModal');
    const form = document.getElementById('confirmDialogForm');
    const csrfInput = document.getElementById('confirmDialogCsrfToken');
    const titleElement = document.getElementById('confirmDialogTitle');
    const messageElement = document.getElementById('confirmDialogMessage');
    
    titleElement.textContent = title;
    messageElement.textContent = message;
    form.action = actionUrl;
    csrfInput.value = csrfToken;
    
    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}

function closeConfirmDialog() {
    const modal = document.getElementById('confirmDialogModal');
    modal.classList.add('hidden');
    document.body.style.overflow = 'auto';
}

function confirmDialogAction() {
    const form = document.getElementById('confirmDialogForm');
    form.submit();
}

// Close modal when clicking outside
document.getElementById('confirmDialogModal').addEventListener('click', function(event) {
    if (event.target === this) {
        closeConfirmDialog();
    }
});

// Close modal with Escape key
document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
        closeConfirmDialog();
    }
});
</script>
